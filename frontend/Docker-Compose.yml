version: ''

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatsphere-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
      - ./frontend/node_modules:/frontend/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsphere-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/backend
      - ./backend/node_modules:/backend/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:latest
    container_name: chatsphere-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:latest
    container_name: chatsphere-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
